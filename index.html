<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resume - Paul Andrei Vicente</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #111;
    --mid: #444;
    --light: #888;
    --rule: #ccc;
  }

  html, body {
    background: #ddd;
    font-family: Cambria, Georgia, serif;
    color: var(--ink);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .page {
    width: 210mm;
    height: 297mm;
    margin: 20px auto;
    background: #fff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 40px rgba(0,0,0,.2);
    break-after: page;
  }

  .page:last-of-type {
    break-after: auto;
  }

  .page.is-editing {
    outline: none;
  }

  .page.is-editing:focus {
    box-shadow: 0 4px 40px rgba(0,0,0,.2), 0 0 0 2px rgba(17,17,17,.2);
  }

  .top {
    padding: 11mm 20mm 0;
    flex-shrink: 0;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12mm;
    padding-bottom: 3mm;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 3mm;
  }

  .header > div:first-child {
    min-width: 0;
  }

  .name {
    font-family: Cambria, Georgia, serif;
    font-size: 26pt;
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1;
    white-space: nowrap;
  }

  .title-tag {
    font-size: 8.5pt;
    letter-spacing: 0;
    text-transform: none;
    color: var(--ink);
    margin-top: 3mm;
    line-height: 1.7;
  }

  .title-tag a {
    color: inherit;
    text-decoration: none;
  }

  .profile-photo {
    width: 30mm;
    height: 34mm;
    object-fit: cover;
    object-position: center top;
    flex-shrink: 0;
    border: 1px solid var(--rule);
  }

  .summary {
    font-size: 8.6pt;
    line-height: 1.65;
    color: var(--mid);
    padding-bottom: 3.5mm;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 0;
  }

  .body {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    padding: 0 20mm 10mm;
    gap: 0;
    margin-top: 4mm;
  }

  .col {
    display: flex;
    flex-direction: column;
  }

  .section {
    margin-bottom: 0;
    padding-bottom: 4mm;
  }

  .section-heading {
    font-family: Cambria, Georgia, serif;
    font-size: 10.4pt;
    font-weight: 700;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 1.5px;
    margin-bottom: 3mm;
    margin-top: 4mm;
  }

  .section:first-child .section-heading { margin-top: 0; }

  .entry { margin-bottom: 3.5mm; }
  .entry:last-child { margin-bottom: 0; }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 3mm;
  }

  .entry-title {
    font-size: 9pt;
    font-weight: 600;
    line-height: 1.3;
  }

  .entry-subtitle {
    font-size: 8pt;
    color: var(--mid);
    margin-top: 0.5mm;
    line-height: 1.3;
  }

  .entry-date {
    font-size: 8pt;
    color: var(--light);
    white-space: nowrap;
    flex-shrink: 0;
  }

  ul.b {
    margin-top: 2mm;
    list-style: none;
    padding-left: 3mm;
  }

  ul.b li {
    font-size: 8.5pt;
    color: var(--mid);
    line-height: 1.55;
    padding-left: 3.5mm;
    position: relative;
    margin-bottom: 1.5px;
  }

  ul.b li::before {
    content: '•';
    position: absolute;
    left: 0;
    color: var(--light);
  }

  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6mm;
    align-items: start;
  }

  .sg { margin-bottom: 3mm; }
  .sg:last-child { margin-bottom: 0; }

  .sg-title {
    font-size: 8.5pt;
    font-weight: 600;
    margin-bottom: 1.5mm;
  }

  .tools-line {
    font-size: 8pt;
    line-height: 1.45;
    color: var(--mid);
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 2px 5px;
    font-size: 8.2pt;
    color: var(--mid);
    line-height: 1.6;
  }

  .tag {
    font-size: inherit;
    color: inherit;
    line-height: inherit;
  }

  .soft {
    font-size: 8pt;
    color: var(--mid);
    line-height: 1.8;
  }

  @page {
    size: A4;
    margin: 0;
  }

  @media print {
    html, body {
      width: 210mm;
      min-height: 297mm;
      background: none;
    }

    body.print-resume .cover-page,
    body.print-cover .resume-page {
      display: none !important;
    }

    .page {
      margin: 0;
      box-shadow: none;
    }

    body.print-resume .resume-page,
    body.print-cover .cover-page {
      break-after: auto;
    }

    .print-btn,
    .data-status { display: none !important; }
  }

  .print-btn {
    width: 210mm;
    margin: 14px auto 10px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
  }

  .edit-note {
    margin-right: auto;
    color: var(--mid);
    font-size: 8pt;
  }

  body.editing .edit-note {
    color: var(--ink);
    font-weight: 500;
  }

  .print-btn button {
    background: #111;
    color: #fff;
    border: none;
    padding: 6px 16px;
    font-family: Cambria, Georgia, serif;
    font-size: 8pt;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
  }

  .print-btn button:hover { background: #333; }

  .letter-page {
    padding: 18mm 20mm;
  }

  .letter-header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 5mm;
    margin-bottom: 12mm;
  }

  .letter-contact {
    font-size: 9pt;
    color: var(--mid);
    line-height: 1.7;
    margin-top: 4mm;
  }

  .letter-contact a {
    color: inherit;
    text-decoration: none;
  }

  .letter-body {
    font-family: Cambria, Georgia, serif;
    font-size: 13.5pt;
    line-height: 1.72;
    color: var(--ink);
  }

  .letter-body p {
    margin-bottom: 6mm;
  }

  .letter-body .salutation {
    margin-bottom: 7mm;
  }

  .signature-block {
    margin-top: 12mm;
  }

  .signature-name {
    font-weight: 600;
  }

  .data-status {
    width: 210mm;
    margin: 10px auto 0;
    font-size: 9pt;
    color: var(--mid);
  }

  .data-status[hidden] {
    display: none;
  }
</style>
</head>
<body>

<div class="print-btn">
  <span class="edit-note">Editing is off. Click Edit Text before changing the resume or cover letter.</span>
  <button type="button" id="editToggle">Edit Text</button>
  <button type="button" onclick="downloadDocument('resume')">Download Resume</button>
  <button type="button" onclick="downloadDocument('cover')">Download Cover Letter</button>
</div>
<div class="data-status" id="dataStatus">Loading resume data...</div>

<div class="page resume-page" id="resumePage"></div>

<div class="page letter-page cover-page" id="coverPage"></div>

<script>
  const pages = document.querySelectorAll('.page');
  const resumePage = document.querySelector('#resumePage');
  const coverPage = document.querySelector('#coverPage');
  const dataStatus = document.querySelector('#dataStatus');
  const editToggle = document.querySelector('#editToggle');
  const editNote = document.querySelector('.edit-note');

  function createElement(tagName, className, text) {
    const element = document.createElement(tagName);
    if (className) element.className = className;
    if (text !== undefined && text !== null) element.textContent = text;
    return element;
  }

  function appendLines(container, lines) {
    lines.filter(Boolean).forEach((line, index) => {
      if (index > 0) container.appendChild(document.createElement('br'));

      if (line.url) {
        const link = createElement('a', '', line.label);
        link.href = line.url;
        container.appendChild(link);
      } else if (line.emailLink) {
        const link = createElement('a', '', line.value);
        link.href = `mailto:${line.value}`;
        container.appendChild(link);
      } else {
        container.appendChild(document.createTextNode(line.value || line));
      }
    });
  }

  function createBulletList(items) {
    const list = createElement('ul', 'b');
    items.forEach((item) => {
      list.appendChild(createElement('li', '', item));
    });
    return list;
  }

  function createSection(title) {
    const section = createElement('div', 'section');
    section.appendChild(createElement('div', 'section-heading', title));
    return section;
  }

  function createEntryHeader(title, subtitleLines, date) {
    const header = createElement('div', 'entry-header');
    const textWrap = createElement('div');
    textWrap.appendChild(createElement('div', 'entry-title', title));

    if (subtitleLines.length) {
      const subtitle = createElement('div', 'entry-subtitle');
      appendLines(subtitle, subtitleLines);
      textWrap.appendChild(subtitle);
    }

    header.appendChild(textWrap);
    if (date) header.appendChild(createElement('div', 'entry-date', date));

    return header;
  }

  function renderResume(data) {
    const contactLines = [
      data.contact.address,
      data.contact.email,
      data.contact.phone,
      ...data.socialLinks.map((link) => ({ label: link.label, url: link.url }))
    ];

    resumePage.innerHTML = '';

    const top = createElement('div', 'top');
    const header = createElement('header', 'header');
    const identity = createElement('div');
    identity.appendChild(createElement('div', 'name', data.personalInfo.name));

    const titleTag = createElement('div', 'title-tag');
    appendLines(titleTag, contactLines);
    identity.appendChild(titleTag);
    header.appendChild(identity);

    const photo = createElement('img', 'profile-photo');
    photo.src = data.personalInfo.photo.src;
    photo.alt = data.personalInfo.photo.alt;
    header.appendChild(photo);
    top.appendChild(header);
    top.appendChild(createElement('div', 'summary', data.professionalSummary));
    resumePage.appendChild(top);

    const body = createElement('div', 'body');
    const column = createElement('div', 'col');

    const workSectionTitle = data.workExperience[0]?.sectionLabel || 'Work Experience';
    const workSection = createSection(workSectionTitle);
    data.workExperience.forEach((job) => {
      const entry = createElement('div', 'entry');
      entry.appendChild(createEntryHeader(job.role, [job.organization, job.location], job.date));
      entry.appendChild(createBulletList(job.highlights));
      workSection.appendChild(entry);
    });
    column.appendChild(workSection);

    const skillsSection = createSection('Technical Skills');
    const skillsGrid = createElement('div', 'skills-grid');
    const skillsLeft = createElement('div', 'skills-left');
    const skillsRight = createElement('div', 'skills-right');

    data.skills.technical.forEach((group, index) => {
      const skillGroup = createElement('div', 'sg');
      skillGroup.appendChild(createElement('div', 'sg-title', group.title));

      if (group.display === 'inline') {
        skillGroup.appendChild(createElement('div', 'tools-line', group.items.join(' | ')));
      } else {
        skillGroup.appendChild(createBulletList(group.items));
      }

      (index % 2 === 0 ? skillsLeft : skillsRight).appendChild(skillGroup);
    });

    skillsGrid.appendChild(skillsLeft);
    skillsGrid.appendChild(skillsRight);
    skillsSection.appendChild(skillsGrid);
    column.appendChild(skillsSection);

    const projectsSection = createSection('Projects');
    data.projects.forEach((project) => {
      const entry = createElement('div', 'entry');
      entry.appendChild(createElement('div', 'entry-title', project.name));
      entry.appendChild(createBulletList(project.highlights));
      projectsSection.appendChild(entry);
    });
    column.appendChild(projectsSection);

    const educationSection = createSection('Education');
    data.education.forEach((item) => {
      const entry = createElement('div', 'entry');
      entry.appendChild(createEntryHeader(
        item.degree,
        [item.school, item.strand].filter(Boolean),
        item.date
      ));
      educationSection.appendChild(entry);
    });
    column.appendChild(educationSection);

    if (data.certifications.length) {
      const certificationsSection = createSection('Certifications');
      data.certifications.forEach((certification) => {
        const entry = createElement('div', 'entry');
        entry.appendChild(createEntryHeader(
          certification.name,
          [certification.issuer].filter(Boolean),
          certification.date
        ));
        certificationsSection.appendChild(entry);
      });
      column.appendChild(certificationsSection);
    }

    body.appendChild(column);
    resumePage.appendChild(body);
  }

  function renderCoverLetter(data) {
    coverPage.innerHTML = '';

    const header = createElement('header', 'letter-header');
    header.appendChild(createElement('div', 'name', data.personalInfo.name));

    const contact = createElement('div', 'letter-contact');
    appendLines(contact, [
      data.contact.address,
      { value: data.contact.email, emailLink: true },
      data.contact.phone
    ]);
    header.appendChild(contact);
    coverPage.appendChild(header);

    const letterBody = createElement('main', 'letter-body');
    letterBody.appendChild(createElement('p', 'salutation', data.coverLetter.salutation));
    data.coverLetter.paragraphs.forEach((paragraph) => {
      letterBody.appendChild(createElement('p', '', paragraph));
    });

    const signatureBlock = createElement('div', 'signature-block');
    signatureBlock.appendChild(createElement('p', '', data.coverLetter.closing));
    signatureBlock.appendChild(createElement('p', 'signature-name', data.coverLetter.signature));
    letterBody.appendChild(signatureBlock);
    coverPage.appendChild(letterBody);
  }

  function showDataError(error) {
    dataStatus.hidden = false;
    dataStatus.textContent = 'Resume data could not be loaded. Please check that /resume.json exists and contains valid JSON.';
    console.error('Failed to load resume.json:', error);
  }

  async function loadResumeData() {
    try {
      const response = await fetch('resume.json', { cache: 'no-store' });
      if (!response.ok) throw new Error(`resume.json returned ${response.status}`);

      const data = await response.json();
      renderResume(data);
      renderCoverLetter(data);
      dataStatus.hidden = true;
      setEditing(false);
    } catch (error) {
      showDataError(error);
    }
  }

  function setEditing(enabled) {
    document.body.classList.toggle('editing', enabled);
    editToggle.textContent = enabled ? 'Done Editing' : 'Edit Text';
    editNote.textContent = enabled
      ? 'Editing is on. Click Done Editing when finished.'
      : 'Editing is off. Click Edit Text before changing the resume or cover letter.';

    pages.forEach((page) => {
      page.classList.toggle('is-editing', enabled);
      page.setAttribute('contenteditable', enabled ? 'true' : 'false');
      page.setAttribute('spellcheck', enabled ? 'true' : 'false');
    });
  }

  function downloadDocument(type) {
    document.body.classList.toggle('print-resume', type === 'resume');
    document.body.classList.toggle('print-cover', type === 'cover');
    document.title = type === 'resume'
      ? 'Resume - Paul Andrei Vicente'
      : 'Cover Letter - Paul Andrei Vicente';
    window.print();
  }

  window.addEventListener('afterprint', () => {
    document.body.classList.remove('print-resume', 'print-cover');
    document.title = 'Resume - Paul Andrei Vicente';
  });

  pages.forEach((page) => {
    page.addEventListener('paste', (event) => {
      event.preventDefault();
      const text = event.clipboardData.getData('text/plain');
      document.execCommand('insertText', false, text);
    });
  });

  setEditing(false);
  editToggle.addEventListener('click', () => {
    setEditing(!document.body.classList.contains('editing'));
  });
  loadResumeData();
</script>
</body>
</html>
